name: Mutation Testing

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  mutation-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Gorgon Mutation Testing
        uses: gorgon/gorgon-action@v1
        with:
          # Optional: path to config file
          # config: 'gorgon.yml'
          
          # Optional: target paths (default: ./...)
          targets: './...'
          
          # Optional: minimum mutation score threshold
          threshold: '70'
          
          # Optional: fail build if threshold not met (default: true)
          fail-on-threshold: 'true'
          
          # Optional: upload badge and reports (default: true)
          upload-badge: 'true'
          upload-reports: 'true'
      
      - name: Comment PR with Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('gorgon-report.txt', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.name,
              body: `## 🧬 Mutation Testing Results\n\n\`\`\`\n${report}\n\`\`\``
            });
