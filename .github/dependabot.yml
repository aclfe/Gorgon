version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "ci"

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "chore(deps):"
    groups:
      go-direct:
        patterns:
          - "*"
        exclude-patterns:
          - "golang.org/x/*"
      go-tooling:
        patterns:
          - "golang.org/x/*"
