# Test: run_mode: only
# Config: Unit tests enabled but external run_mode: only should skip them

operators:
  - all

threshold: 0

concurrent: 4
cache: false
progbar: false

unit_tests_enabled: true

external_suites:
  enabled: true
  run_mode: only
  suites:
    - name: integration-tests
      paths:
        - ./tests/...
      short_circuit: true

outputs:
  - json:report.json
