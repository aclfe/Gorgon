# Test: run_mode: alongside
# Config: External runs on all mutants alongside unit tests

operators:
  - all

threshold: 0

concurrent: 4
cache: false
progbar: false

unit_tests_enabled: true

external_suites:
  enabled: true
  run_mode: alongside
  suites:
    - name: integration-tests
      paths:
        - ./tests/...
      short_circuit: true

outputs:
  - json:report.json
