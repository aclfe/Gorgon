operators:
    - all
concurrent: all
threshold: 80
cache: false
dry_run: false
debug: true
progbar: true
cpu_profile: "false"
exclude:
    - '*_test.go'
include: []
skip:
    - vendor/
    - internal/testing/schemata_nodes/
    - internal/testing/transform.go
    - internal/testing/executor.go
    - internal/testing/workspace.go
    - internal/testing/utils.go
    - internal/testing/mutants.go
    - internal/testing/mutant.go
    - internal/testing/schemata.go
    - internal/testing/consts.go
    - pkg/mutator/operators/
    - pkg/mutator/analysis/
skip_func:
    - foo/bar.go:MyFunc
    - examples/mutations/variable_replacement/variable_replacement.go:FindMax
tests: []
base: ""
suppress:
    - location: examples/mutations/panic_removal/panic_removal.go:13
      operators:
        - panic_removal
    - location: examples/mutations/panic_removal/panic_removal.go:6
      operators:
        - panic_removal:9
    - location: examples/mutations/negate_condition/negate_condition.go:6
