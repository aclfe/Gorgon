operators:
    - all
concurrent: all
threshold: 80
cache: false
dry_run: false
debug: false
progbar: true
show_killed: true
show_survived: true
format: textfile
output: "output.txt"
debug_files: true
cpu_profile: ""
exclude:
    - '*_test.go'
include: []
skip:
    - vendor/
skip_func:
    - foo/bar.go:MyFunc
    - examples/mutations/variable_replacement/variable_replacement.go:FindMax
tests: []
base: ""
suppress:
    - location: examples/mutations/negate_condition/negate_condition.go:6
    - location: examples/mutations/panic_removal/panic_removal.go:13
      operators:
        - panic_removal
    - location: examples/mutations/panic_removal/panic_removal.go:6
      operators:
        - panic_removal:9
