# Basic Configuration
threshold: 80
dry_run: false
cache: false
debug: true
progbar: true
show_killed: true
show_survived: true
format: textfile
output: output.txt
cpu_profile: ""

#Controlling the way mutations are generated and tested
operators:
    - all
concurrent: all
tests: []
base: ""
exclude:
    - '*_test.go'
include: []
skip:
    - vendor/
skip_func:
    - foo/bar.go:MyFunc
    - examples/mutations/variable_replacement/variable_replacement.go:FindMax

#Automatically syned as gorgon comments are put in codebase
suppress:
    - location: examples/mutations/panic_removal/panic_removal.go:13
      operators:
        - panic_removal
    - location: examples/mutations/panic_removal/panic_removal.go:6
      operators:
        - panic_removal:9
    - location: examples/mutations/negate_condition/negate_condition.go:6
